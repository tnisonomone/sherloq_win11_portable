name: Build Sherloq Portable EXE
on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv pip install -r gui/requirements.txt

      - name: Install Windows libmagic DLL
        run: uv pip install python-magic-bin

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          .venv\Scripts\pyinstaller.exe `
            --onefile --windowed --name Sherloq-Windows `
            --collect-all tensorflow `
            --collect-all keras `
            --collect-all xgboost `
            --collect-all PySide6 `
            --collect-all matplotlib `
            --collect-all scipy `
            --collect-all sklearn `
            --collect-all cv2 `
            --collect-all rawpy `
            --collect-all pywt `
            --hidden-import tensorflow.compat.v1 `
            --hidden-import PySide6.QtWebEngineWidgets `
            --hidden-import joblib `
            --add-data "gui/icons;gui/icons" `
            --add-data "gui/models;gui/models" `
            --add-data "gui/noiseprint/nets;gui/noiseprint/nets" `
            --add-data "gui/pyexiftool/exiftool/windows;gui/pyexiftool/exiftool/windows" `
            sherloq.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sherloq-Windows-Portable
          path: dist/Sherloq-Windows.exe
